name: RDP
on:
  workflow_dispatch:
jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360
    permissions:
      contents: read
    steps:
      - name: Optimize Windows for RDP Performance
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects' `
                             -Name "VisualFXSetting" -Value 2 -Force -ErrorAction SilentlyContinue
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations' `
                             -Name "DWMFRAMEINTERVAL" -Value 15 -Force -ErrorAction SilentlyContinue
          @("WSearch","SysMain","DiagTrack","MapsBroker","DoSvc") | ForEach-Object {
              Stop-Service -Name $_ -Force -ErrorAction SilentlyContinue
              Set-Service -Name $_ -StartupType Disabled -ErrorAction SilentlyContinue
          }
          Get-Process -Name "SearchIndexer","SearchProtocolHost","OneDrive" -ErrorAction SilentlyContinue | 
              Stop-Process -Force -ErrorAction SilentlyContinue

      - name: Configure Core RDP Settings
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "MinEncryptionLevel" -Value 1 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "ColorDepth" -Value 3 -Force
          
          $tsPolicies = 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services'
          if (-not (Test-Path $tsPolicies)) { New-Item -Path $tsPolicies -Force | Out-Null }
          Set-ItemProperty -Path $tsPolicies -Name "fNoRemoteDesktopWallpaper" -Value 1 -Force -ErrorAction SilentlyContinue
          Set-ItemProperty -Path $tsPolicies -Name "fDisableMenuAnims" -Value 1 -Force -ErrorAction SilentlyContinue
          
          netsh advfirewall firewall delete rule name="RDP-Tailscale" 2>$null
          netsh advfirewall firewall add rule name="RDP-Tailscale" `
            dir=in action=allow protocol=TCP localport=3389 remoteip=100.64.0.0/10
          
          try { Restart-Service -Name TermService -Force -ErrorAction Stop }
          catch { net stop TermService 2>$null; net start TermService 2>$null }

      - name: Create RDP User
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Security
          $charSets = @{
              Upper=[char[]](65..90); Lower=[char[]](97..122)
              Number=[char[]](48..57)
              Special=([char[]](33..47)+[char[]](58..64)+[char[]](91..96)+[char[]](123..126))
          }
          $passwordChars = @()
          $passwordChars += $charSets.Upper | Get-Random -Count 4
          $passwordChars += $charSets.Lower | Get-Random -Count 4
          $passwordChars += $charSets.Number | Get-Random -Count 4
          $passwordChars += $charSets.Special | Get-Random -Count 4
          $password = -join ($passwordChars | Sort-Object { Get-Random })
          $securePassword = ConvertTo-SecureString $password -AsPlainText -Force
          
          $oldUser = Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue
          if ($oldUser) { Remove-LocalUser -Name "RDP" -ErrorAction SilentlyContinue; Start-Sleep -Seconds 2 }
          
          New-LocalUser -Name "RDP" -Password $securePassword -AccountNeverExpires
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          
          Write-Output "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

      - name: Install Tailscale
        shell: pwsh
        run: |
          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $output = "$env:TEMP\tailscale.msi"
          for ($i = 1; $i -le 3; $i++) {
              try { Invoke-WebRequest -Uri $url -OutFile $output -ErrorAction Stop; break }
              catch { if ($i -eq 3) { throw }; Start-Sleep -Seconds 5 }
          }
          Start-Process msiexec.exe -ArgumentList "/i", "`"$output`"", "/quiet", "/norestart" -Wait
          Remove-Item $output -Force -ErrorAction SilentlyContinue

      - name: Establish Tailscale Connection
        shell: pwsh
        run: |
          $tailscalePath = "$env:ProgramFiles\Tailscale\tailscale.exe"
          
          $waitCount = 0
          while (-not (Test-Path $tailscalePath) -and $waitCount -lt 10) {
              Start-Sleep -Seconds 2
              $waitCount++
          }
          if (-not (Test-Path $tailscalePath)) { Write-Error "Tailscale not found"; exit 1 }
          
          # HOSTNAME STATIS — MagicDNS name tetap sama!
          $staticHostname = "github-rdp"
          
          # Hapus node lama
          & $tailscalePath logout 2>$null
          Start-Sleep -Seconds 3
          
          # Connect
          & $tailscalePath up `
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
            --hostname=$staticHostname `
            --force-reauth `
            --accept-routes
         
          $tailscaleIP = $null
          $attempt = 0
          while (-not $tailscaleIP -and $attempt -lt 15) {
              $tailscaleIP = & $tailscalePath ip -4 2>$null
              if ($tailscaleIP) {
                  $tailscaleIP = $tailscaleIP.Trim()
                  if ($tailscaleIP -match "^100\.") { break }
                  else { $tailscaleIP = $null }
              }
              Start-Sleep -Seconds 3
              $attempt++
          }
         
          if (-not $tailscaleIP) { Write-Error "Tailscale IP not assigned"; exit 1 }
          
          Write-Output "TAILSCALE_IP=$tailscaleIP" >> $env:GITHUB_ENV

      - name: Verify RDP
        shell: pwsh
        run: |
          $testResult = Test-NetConnection -ComputerName 127.0.0.1 -Port 3389
          if (-not $testResult.TcpTestSucceeded) { Write-Error "RDP not listening"; exit 1 }

      - name: Maintain Connection
        shell: pwsh
        run: |
          $startTime = Get-Date
          $endTime = $startTime.AddMinutes(360)
          
          $ip = $env:TAILSCALE_IP
          $pass = $env:RDP_PASSWORD
          
          Write-Host "`n========================================"
          Write-Host "  RDP CONNECTION DETAILS"
          Write-Host "========================================"
          Write-Host "  MagicDNS:   github-rdp.YOUR-TAILNET.ts.net"
          Write-Host "  IP Backup:  $ip"
          Write-Host "  Username:   RDP"
          Write-Host "  Password:   $pass"
          Write-Host "  Expires:    $($endTime.ToString('HH:mm:ss'))"
          Write-Host "========================================"
          Write-Host ""
          Write-Host "  iOS Settings:"
          Write-Host "  - PC Name: github-rdp.YOUR-TAILNET.ts.net"
          Write-Host "  - Resolution: 1280x720"
          Write-Host "========================================`n"
         
          while ((Get-Date) -lt $endTime) {
              $remaining = [math]::Round(($endTime - (Get-Date)).TotalMinutes, 1)
              Write-Host "[$(Get-Date)] RDP Active - $remaining min remaining"
              Start-Sleep -Seconds 300
          }

      - name: Cleanup
        if: always()
        shell: pwsh
        run: |
          $user = Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue
          if ($user) { Remove-LocalUser -Name "RDP" -ErrorAction SilentlyContinue }
          netsh advfirewall firewall delete rule name="RDP-Tailscale" 2>$null
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 1 -Force
          & "$env:ProgramFiles\Tailscale\tailscale.exe" logout 2>$null
