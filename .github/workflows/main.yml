# .github/workflows/windows.yml
name: Windows 11 VM - RDP Lengkap

on:
  workflow_dispatch:

jobs:
  vm:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Run Windows
        run: |
          docker run -d \
            --name windows \
            --privileged \
            -p 8006:8006 \
            -p 3389:3389 \
            -e VERSION="tiny11" \
            -e USERNAME="MASTER" \
            -e PASSWORD="admin@123" \
            -e RAM_SIZE="8G" \
            -e CPU_CORES="4" \
            -e KVM="N" \
            -v /tmp/windows:/storage \
            dockurr/windows

      - name: Tunggu Windows Boot
        run: |
          echo "Menunggu Windows siap (6 menit)..."
          sleep 360

      - name: Enable RDP di Windows
        run: |
          docker exec windows cmd /c "reg add \"HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\Terminal Server\" /v fDenyTSConnections /t REG_DWORD /d 0 /f" || true
          docker exec windows cmd /c "netsh advfirewall firewall set rule group=\"remote desktop\" new enable=Yes" || true
          docker exec windows cmd /c "net start termservice" || true
          sleep 10

      - name: Info Koneksi
        run: |
          IP=$(tailscale ip -4)
          echo "=================================="
          echo "🖥️ WINDOWS VM READY"
          echo "=================================="
          echo "Tailscale IP: $IP"
          echo ""
          echo "CARA KONEK RDP:"
          echo "1. Pastikan komputer kamu install Tailscale"
          echo "2. Login Tailscale dengan akun yang sama"
          echo "3. Buka Windows App / Remote Desktop"
          echo "4. Masukkan: $IP:3389"
          echo ""
          echo "Username: MASTER"
          echo "Password: admin@123"
          echo "=================================="

      - name: Cek Port RDP
        run: |
          echo "=== Cek dari dalam container ==="
          docker exec windows netstat -an 2>/dev/null | grep 3389 || echo "RDP belum siap"
          echo ""
          echo "=== Cek dari host ==="
          sudo apt install -y netcat
          nc -zv 127.0.0.1 3389 || echo "Port 3389 tidak terbuka di host"

      - name: Keep Alive
        run: |
          while true; do
            docker ps | grep -q windows || exit 1
            echo "Running: $(date) - $(tailscale ip -4)"
            sleep 300
          done



