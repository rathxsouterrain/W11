# .github/workflows/windows.yml
name: Windows 11 VM

on:
  workflow_dispatch:

jobs:
  vm:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}  # ← Cuma 1 ini

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Run Windows (No KVM)
        run: |
          docker run -d \
            --name windows \
            --privileged \
            -p 8006:8006 \
            -p 3389:3389 \
            -e VERSION="11" \
            -e USERNAME="MASTER" \
            -e PASSWORD="admin@123" \
            -e RAM_SIZE="8G" \
            -e CPU_CORES="4" \
            -e KVM="N" \
            -v /tmp/windows:/storage \
            dockurr/windows

      - name: Tunggu Boot & Info
        run: |
          sleep 300
          docker logs windows | tail -20
          
          IP=$(tailscale ip -4)
          echo "=================================="
          echo "🖥️ Windows VM Ready!"
          echo "Web UI: http://$IP:8006"
          echo "RDP: $IP:3389"
          echo "User: MASTER"
          echo "Pass: admin@123"
          echo "=================================="

      - name: Keep Alive
        run: |
          while true; do
            docker ps | grep -q windows || exit 1
            echo "Alive: $(date)"
            sleep 300
          done

