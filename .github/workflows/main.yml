# .github/workflows/windows.yml
name: Windows 11 VM

on:
  workflow_dispatch:

jobs:
  vm:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Debug Secrets
        run: |
          if [ -z "${{ secrets.TAILSCALE_CLIENT_ID }}" ]; then
            echo "::error::TAILSCALE_CLIENT_ID kosong!"
            exit 1
          else
            echo "✓ TAILSCALE_CLIENT_ID ada"
          fi
          
          if [ -z "${{ secrets.TAILSCALE_SECRET }}" ]; then
            echo "::error::TAILSCALE_SECRET kosong!"
            exit 1
          else
            echo "✓ TAILSCALE_SECRET ada"
          fi

      - name: Connect Tailscale
        uses: tailscale/github-action@v3  # ← v3 lebih stabil
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_SECRET }}
          tags: tag:github-actions
          version: latest

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Run Windows (No KVM)
        run: |
          docker run -d \
            --name windows \
            --privileged \
            -p 8006:8006 \
            -p 3389:3389 \
            -e VERSION="11" \
            -e USERNAME="MASTER" \
            -e PASSWORD="admin@123" \
            -e RAM_SIZE="8G" \
            -e CPU_CORES="4" \
            -e KVM="N" \
            -v /tmp/windows:/storage \
            dockurr/windows

      - name: Wait & Check Logs
        run: |
          echo "Menunggu Windows boot (5 menit)..."
          sleep 300
          docker logs windows | tail -30

      - name: Show Connection Info
        run: |
          TAILSCALE_IP=$(tailscale ip -4)
          echo "=================================="
          echo "🖥️ Windows VM Ready!"
          echo "Web UI: http://${TAILSCALE_IP}:8006"
          echo "RDP: ${TAILSCALE_IP}:3389"
          echo "User: MASTER"
          echo "Pass: admin@123"
          echo "=================================="

      - name: Keep Alive (6 jam max)
        run: |
          for i in {1..72}; do  # 72 x 5 menit = 6 jam
            if ! docker ps | grep -q windows; then
              echo "Container mati!"
              exit 1
            fi
            echo "[$i/72] Still running: $(date)"
            sleep 300
          done
